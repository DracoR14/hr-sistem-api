services:
  - type: web
    name: hr-sistem-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hr-sistem-db
          property: connectionString

databases:
  - name: hr-sistem-db
    databaseName: hrdb
    user: hruser
    plan: free
